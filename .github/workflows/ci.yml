name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: prefix-dev/setup-pixi@v0.9.6
        with:
          cache: true
      - run: pixi run check  # ruff + ruff-format + mypy --strict + pytest
